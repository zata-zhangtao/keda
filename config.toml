# =============================================================================
# Agent Runner Console（统一管理终端）
# =============================================================================
# 管理终端的运行历史 / 审计落库与托管进程设置。

[agent_runner.repositories.keda-main]
path = "/Users/zata/code/keda"
enabled = true
display_name = "Keda Main"
# GitHub owner/name used by `gh pr list --repo` for PR column population.
# 缺省时 PR 列为空，并在 stderr 一次性打印 WARN。
github_repo = "zata-zhangtao/keda"

[agent_runner.repositories.zata-zhangtao-fsense]
path = "/Users/zata/.iar/repos/zata-zhangtao/fsense"
enabled = true
display_name = "fsense"
github_repo = "zata-zhangtao/fsense"

[agent_runner.repositories.zata-zhangtao-freshai]
path = "/Users/zata/.iar/repos/zata-zhangtao/freshai"
enabled = true
display_name = "freshai"
github_repo = "zata-zhangtao/freshai"
[agent_runner.console]
# 运行历史与审计日志的 SQLite 文件路径（CLI 直跑与面板托管共用）。
history_db_path = "~/.iar/console.db"
# 面板托管 runner 进程的注册表（JSON pidfile，后端重启后据此复活探活）。
process_registry_path = "~/.iar/processes.json"
# 托管进程的 stdout/stderr 日志目录。全局安装时使用绝对路径，
# 避免依赖 keda 项目根。
process_log_dir = "~/.iar/process-logs"
# 托管进程的启动命令前缀。全局安装后直接使用 `iar`；
# 在 keda 源码树内开发时可覆盖为 ["uv", "run", "iar"]。
runner_command = ["iar"]
# 停止进程时 SIGTERM 后等待多少秒升级为 SIGKILL。
stop_timeout_seconds = 30

# =============================================================================
# Agent Runner Daemon（常驻轮询）
# =============================================================================
# daemon / review-daemon 的默认轮询间隔（秒）。
# CLI 可通过 --interval 覆盖；环境变量 AGENT_RUNNER_REVIEW_INTERVAL_SECONDS
# 与 AGENT_RUNNER_RUN_INTERVAL_SECONDS 也可以覆盖。

[agent_runner.daemon]
review_interval_seconds = 120
run_interval_seconds = 120
# Maximum `agent/deliberate` Issues to drive through Phase 0 per pass.
max_deliberation_issues = 1

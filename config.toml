# =============================================================================
# Configuration File - Non-Sensitive Defaults
# =============================================================================
# This file contains non-sensitive configuration defaults organized by section.
# Sensitive values (passwords, API keys) should be set in .env file.
#
# To override any value, either:
# 1. Set the corresponding environment variable (highest priority)
# 2. Modify this file
# 3. Accept the code default (lowest priority)
# =============================================================================

# =============================================================================
# Application Settings
# =============================================================================
[app]
name = "keda"
log_level = "INFO"

# =============================================================================
# Preview Deployment Settings
# =============================================================================
# Non-sensitive structure only. Sensitive values (server host, SSH key,
# registry password, database password) must be provided via GitHub Secrets
# or environment variables and are never committed to this file.
# =============================================================================
[preview]
enabled = true
base_domain = "preview.yewmoon.fun"
app_dir_root = "/opt/preview"
url_scheme = "https"
registry_host = "ghcr.io"
registry_namespace = "zata-zhangtao"
traefik_network = "traefik"

[template_sync]
# Project-specific paths skipped by default by `just sync-template`.
# Use `just sync-template --all` to include these paths for a one-off sync.
project_skip_paths = [
    "src/backend/",
    "docs/",
    "tests/",
    "apps/",
    "services/",
    "infra/",
    "deploy/",
    "helm/",
    "terraform/",
    "ansible/",
    "data/",
    "uploads/",
    "artifacts/",
    "tmp/",
]

# Paths that should stay visible even if they match `project_skip_paths`.
project_include_paths = []

# =============================================================================
# Database Settings (PostgreSQL)
# =============================================================================
[database]
backend = "postgresql"
host = "localhost"
port = 5432
name = "app_database"
driver = "psycopg2"

# =============================================================================
# Chat Model Settings
# =============================================================================
[chat_model]
name = "gpt-4"
provider = "openai"
temperature = 0.2

# =============================================================================
# MinIO Object Storage Settings
# =============================================================================
[minio]
endpoint = "localhost:9000"
secure = false
bucket_raw_documents = "default-bucket"

# =============================================================================
# Qdrant Vector Database Settings
# =============================================================================
[qdrant]
host = "localhost"
port = 6333
collection_name = "default_collection"

# =============================================================================
# Embedding Model Settings
# =============================================================================
[embedding]
model = "sentence-transformers/all-MiniLM-L6-v2"
dim = 384
offline_mode = true
model_dir = "resources/models"

# =============================================================================
# Document Chunking Settings
# =============================================================================
[chunking]
# Chunk size in characters
size = 512
# Overlap between chunks in characters
overlap = 50

# =============================================================================
# Timeout Settings (in seconds)
# =============================================================================
[timeouts]
# Timeout for embedding model loading
embedding_model_load_seconds = 300
# Timeout for single document processing
ingestion_document_seconds = 600
# Timeout for overall ingestion job
ingestion_job_seconds = 7200
# Timeout for MinIO operations
minio_seconds = 60

# =============================================================================
# Agent Runner Settings
# =============================================================================
[agent_runner]
max_issues = 1

[agent_runner.labels]
ready = "agent/ready"
running = "agent/running"
supervising = "agent/supervising"
review = "agent/review"
failed = "agent/failed"
blocked = "agent/blocked"
validation_pending = "validation/pending"
validation_passed = "validation/passed"
codex = "agent/codex"
claude = "agent/claude"
kimi = "agent/kimi"
rework_prd = "agent/rework-prd"
deliberate = "agent/deliberate"

[agent_runner.git]
remote = "zata"
base_branch = "main"

[agent_runner.worktree]
create_command = "iar worktree create --branch issue-{issue_number} --base-branch {base_branch}"
reuse_command = "iar worktree path --branch issue-{issue_number}"
path_command = "iar worktree path --branch issue-{issue_number}"

[agent_runner.runner]
default_agent = "claude"
max_recovery_attempts = 5
recovery_retry_delay_seconds = 30
# Wall-clock timeout for a single agent execution attempt (initial or recovery).
timeout_seconds = 14400
# Inactivity timeout: kill the agent if it produces no stdout/stderr for this long.
inactivity_timeout_seconds = 1200
# 提交前自动运行的验证命令；任一命令失败会进入 recovery。
# 这里显式拆出 pre-commit，避免 `just test` 的 quality-flag 缓存把 lint 跳过；
# `SKIP=check-test-flag` 防止 pre-commit 在 just test 还没跑完就因标记不存在而失败。
verification_commands = [
  "git diff --check",
  "SKIP=check-test-flag uv run pre-commit run --all-files --show-diff-on-failure",
  "just test all",
  "uv run mkdocs build --strict",
]

# =============================================================================
# Agent Runner Memory Persistence
# =============================================================================
# 控制 runner 的短期/长期记忆与 skill 蒸馏功能。锚点语义：
# - 下面 ``base_dir`` / ``skill_drafts_dir`` / ``promoted_skills_dirs`` 的
#   相对路径相对**目标仓库主检出根**解析，而不是相对每个 Issue 的临时
#   工作副本。绝对路径与 ``~`` 会被原样使用（运营者把目录移出仓库外
#   ——例如防 ``git clean -fdx`` 误删、或多机共享——仅需将下方的相对路径
#   改成绝对路径）。
# - 记忆文件默认被 ``.gitignore`` 排除，不进版本控制。
# - 跨副本累积由
#   ``backend.engines.agent_runner.factory._anchor_memory_config``
#   一次性绝对化；本节只关心值，不关心解析位置。
[agent_runner.memory]
enabled = true
base_dir = ".iar/memory"
skill_drafts_dir = ".iar/skills/drafts"
# 已晋升 skill 的扫描目录；可配置多个项目级 skills 目录。
promoted_skills_dirs = [".iar/skills"]
# 注入 prompt 时最多选用的 skill / 长期记忆条目数。
top_k_skills = 3
top_k_facts = 5
# 是否自动将满足条件的 skill 草稿晋升到 promoted_skills_dirs。
# 默认开启：当 usage_count >= auto_promote_threshold 且 success_rate >=
# auto_promote_min_success_rate 时自动晋升；设为 false 则改为人工审查后移动。
auto_promote = true
auto_promote_threshold = 3
auto_promote_min_success_rate = 1.0

[agent_runner.safety]
auto_merge = false
forbidden_path_patterns = [
  ".env",
  ".env.*",
  "secrets/*",
  "docker-compose.prod.yml",
]

# =============================================================================
# Autopilot 快速档（合并队列）
# =============================================================================
# 启用后，supervisor approve 的 PR 不再停在"等人合并"，而是被一条串行
# 合并队列消费：verifier 门禁 → 自动签核 → rebase → 全量验证 → 禁改终扫 →
# checks 全绿 → squash 合并。两个开关同时为真才生效（"双同意"），保证
# 历史上的 `safety.auto_merge = true` 不会单独触发自动合并，需仓库
# 显式在本段开启 ``enabled = true``。
#
# 迁移提示：本段首次落地后，任何已设为 ``safety.auto_merge = true`` 的环境
# 若不同时把下面 ``enabled`` 设为 ``true``，仍然回到"等人工合并"的现状——
# 自动签核 / 自动合并都不会发生。但 ``enabled`` 本段是全新键，既往配置不会
# 意外激活快速档。
[agent_runner.autopilot]
enabled = false
# 仅支持 "squash"；非法值在配置加载期直接拒绝。
merge_method = "squash"
# 当 Issue 需要 validation 时，是否要求 validation/verifier-passed 标签先存在；
# 缺失则本轮跳过，留给 verifier/repair 流程。
require_verifier_pass = true
# verifier 绿灯后自动替人工勾选 PR body 的 Realistic Validation sign-off 清单
# （与 marker 评论均幂等）。
auto_sign_off = true
# 等 PR checks 全绿的最大秒数；超时则放弃本轮合并（不阻塞后续 PR）。
merge_check_timeout_seconds = 1800

# =============================================================================
# Realistic Validation 证据门禁
# =============================================================================
# 证据写入 worktree 内 evidence_dir（runner 通过 info/exclude 本地排除，
# 永不进入代码 diff），发布时推送到 orphan 分支 <branch_prefix>issue-<N>
# 并在 PR 上发证据评论；人工在 PR body 勾选清单后才允许合并。
[agent_runner.validation]
enabled = true
evidence_dir = ".iar/evidence"
branch_prefix = "iar-evidence/"
# 逐项格式对账：第 n 条清单必须有 rv-<n>-* 证据，且条目点名的格式
# （截图/pdf/txt/word/excel/csv/录屏）必须有对应后缀文件。
# 设为 false 退化为仅要求证据目录非空；单个 PRD 可在 Realistic
# Validation 小节写 "Evidence Format Waiver: <理由>" 按任务关闭。
evidence_format_check = true
# 使用 agent 解析 checklist item 的格式要求（claude/codex/kimi），
# 物化为 iar:evidence-format marker。agent 不可用时回退到正则匹配。
parse_evidence_format_with_agent = true
# 证据 prompt 与 PR 评论固定标签语言，默认中文；可改为 "en-US"。
language = "zh-CN"
# 是否为带 iar:structured-evidence marker 的新 Issue 要求 evidence.json manifest。
structured_evidence = true
# 前端改动（git diff 命中 frontend_paths）强制证据目录含真实视觉文件(图片/视频),否则门禁失败。
# 判定按 diff 而非清单关键字,独立于 verifier;设为 false 按仓库关闭。
frontend_visual_evidence_required = true
frontend_paths = ["frontend-admin", "frontend-public"]

[agent_runner.pre_pr_review]
# Draft PR 创建前的 AI review 门禁（push 之后、PR 之前）
enabled = true
review_agent = "auto"
allow_same_agent = true
max_attempts = 2
timeout_seconds = 1800
# Review rules appended after the review packet. Empty list = use the
# embedded default that calls the ``code-reviewer`` skill and asks the
# reviewer to emit structured findings. Override line-by-line in
# ``.iar.toml`` to customize without forking ``agent_review.py``.
review_prompt_template = []

[agent_runner.post_pr_supervisor]
enabled = true
supervisor_agent = "auto"
max_repair_attempts = 2
max_agent_crash_retries = 5
crash_retry_initial_backoff_seconds = 30
crash_retry_max_backoff_seconds = 600

# =============================================================================
# Agent Runner Prompt Templates
# =============================================================================
# Template variables:
#   {issue_number}  - GitHub Issue number
#   {issue_title}   - GitHub Issue title
#   {issue_url}     - GitHub Issue URL
#   {worktree_path} - Absolute path to the assigned worktree
#   {issue_body}    - Full Issue body markdown
#   {prd_line}      - Auto-generated PRD reference line
#   {validation_line} - Auto-generated Realistic Validation evidence rule
[agent_runner.prompts]
default_phase = "execution"

[agent_runner.prompts.phases]
execution = [
  "Complete GitHub Issue #{issue_number}: {issue_title}",
  "",
  "Issue URL: {issue_url}",
  "Worktree: {worktree_path}",
  "{prd_line}",
  "{validation_line}",
  "",
  "Issue body:",
  "{issue_body}",
  "",
  "Execution rules:",
  "- Read AGENTS.md and follow repository instructions.",
  "- Only modify files inside the current worktree.",
  "- Do not merge main, delete branches, push, or create PRs; the runner handles publishing.",
  "- Do not run `git add` or `git commit`; the runner exposes a restricted commit proxy.",
  "- After finishing your changes, request a commit by writing `.agent-runner/commit-request.json` as JSON with `commit_message`.",
  "- Do not touch production systems or real business data.",
  "- Implement the requested task with focused tests and docs updates.",
  "- Finish with a concise summary, tests run, and remaining risk.",
]

# =============================================================================
# Agent Runner Generated Content Configuration
# =============================================================================
# Controls AI-generated content for GitHub Issues and PRs.
# `[agent_runner.generated_content]` is the single configuration entry.
# Do not add `[agent_runner.content_generation]`.
#
# mode = "template" uses .format() rendering with documented variables.
# mode = "agent" runs a local read-only agent and parses its output.
# When generation is disabled, fails, or produces invalid output,
# the runner falls back to deterministic templates.

[agent_runner.generated_content]
enabled = true
fallback = "template"
max_input_chars = 20000
default_agent = "claude"

[agent_runner.generated_content.issue_from_prd]
enabled = true
mode = "template"
output = "json"
title_template = "{prd_title}"
body_template = [
  "## Summary",
  "",
  "{prd_introduction}",
  "",
  "## Canonical PRD",
  "",
  "- PRD path: `{relative_prd_path}`",
  "",
  "## PRD Introduction",
  "",
  "{prd_introduction}",
  "",
  "## Delivery Notes",
  "",
  "- Recommended branch: `task/<issue-number>-<slug>`",
  "- Worktree command: `just worktree --issue <issue-number>`",
  "- PR should include: `Closes #<issue-number>`",
]
agent = "auto"
timeout_seconds = 120
prompt = [
  "Generate a readable GitHub Issue from this PRD.",
  "Return strict JSON with keys: title, body.",
  "The body must contain this exact machine-readable line:",
  "- PRD path: `{relative_prd_path}`",
  "",
  "Issue type: {issue_type}",
  "Initial title: {title}",
  "PRD introduction (first section):",
  "{prd_introduction}",
  "",
  "PRD goals:",
  "{prd_goals}",
  "",
  "PRD content:",
  "{prd_text}",
]

[agent_runner.generated_content.draft_pr]
enabled = true
mode = "agent"
output = "markdown"
include_commit_log = true
include_diff_stat = true
title_template = "[Agent] {issue_title}"
body_template = [
  "Closes #{issue_number}",
  "",
  "Generated by issue-agent-runner.",
]
agent = "auto"
timeout_seconds = 120
prompt = [
  "Generate a concise, readable draft PR description.",
  "The first non-empty line must be: Closes #{issue_number}",
  "Use these sections: Summary, Validation, Risk, Reviewer Notes.",
  "",
  "Issue title: {issue_title}",
  "Issue body:",
  "{issue_body}",
  "",
  "Commit log:",
  "{commit_log}",
  "",
  "Diff stat:",
  "{diff_stat}",
]

[agent_runner.generated_content.prd_from_issue]
enabled = true
mode = "agent"
output = "markdown"
agent = "auto"
timeout_seconds = 120
include_commit_log = false
include_diff_stat = false
body_template = [
  "# PRD: {issue_title}",
  "",
  "- GitHub Issue: #{issue_number}",
  "",
  "## 1. Introduction & Goals",
  "",
  "{issue_body}",
  "",
  "## 2. Requirement Shape",
  "",
  "- **Actor**: User",
  "- **Trigger**: TBD",
  "- **Expected Behavior**: TBD",
  "- **Scope Boundary**: TBD",
  "",
  "## 3. Acceptance Checklist",
  "",
  "- [ ] Define requirements",
  "- [ ] Implement the feature",
  "- [ ] Run verification",
]
# PRD 规范单一来源是 `prd` skill（~/.claude/skills/prd/SKILL.md，可用 IAR_PRD_SKILL_PATH
# 覆盖）。agent 模式优先把该 skill 规范注入 prompt；仅当 skill 不可达时才回退到下面
# 这份模板 prompt。请勿在此处与 skill 之间维护两份漂移的章节契约。
prompt = [
  "You are a technical product manager. Write a comprehensive PRD (Product Requirements Document) in Markdown format.",
  "",
  "Prompt Section: Input Context",
  "",
  "GitHub Issue #{issue_number}: {issue_title}",
  "",
  "Issue Body:",
  "{issue_body}",
  "",
  "Issue Comments (chronological):",
  "{issue_comments}",
  "",
  "Existing PRD (to be rewritten if present):",
  "{existing_prd_text}",
  "",
  "Prompt Section: Repository Structure Summary",
  "{repo_structure_summary}",
  "",
  "Prompt Section: Output Requirements",
  "",
  "1. Write the PRD in the same language as the Issue title (Chinese if title is Chinese, English otherwise).",
  "2. Follow this exact structure:",
  "   - `# PRD: <title>`",
  "   - `- GitHub Issue: <url>` (preserve existing if present)",
  "   - `## 1. Introduction & Goals`",
  "   - `## 2. Requirement Shape`",
  "   - `## 3. Repository Context And Architecture Fit`",
  "   - `## 4. Recommendation`",
  "   - `## 5. Implementation Guide`",
  "   - `## 6. Definition Of Done`",
  "   - `## 7. Acceptance Checklist`",
  "   - `## 8. Functional Requirements`",
  "   - `## 9. Non-Goals`",
  "   - `## 10. Risks And Follow-Ups`",
  "   - `## 11. Decision Log`",
  "3. If `existing_prd_text` is provided, rewrite it based on the full issue history. Preserve sections that are still valid, update changed requirements, and add new ones from comments.",
  "4. The PRD must be specific enough for an AI coding agent to implement.",
  "5. Output only the PRD markdown, no extra commentary.",
]

[agent_runner.interactive_decision]
enabled = true
default_agent = "claude"
default_output_dir = "logs/agent-runner/decisions"
planner_timeout_seconds = 120
max_context_chars = 24000
# Whether `iar ask --yes` is allowed to skip interactive confirmation.
allow_execute_yes = true

# =============================================================================
# Agent Runner REPL Configuration (`iar` with no subcommand)
# =============================================================================
# Controls the interactive REPL entrypoint. Default agent is `claude`;
# `--agent codex|kimi` overrides it per invocation. `--agent auto` is
# rejected here (use `iar run` for that).
[agent_runner.repl]
enabled = true
default_agent = "claude"
default_output_dir = "logs/agent-runner/repl"
max_context_chars = 24000
agent_timeout_seconds = 120
# Commands the REPL executor may run without explicit confirmation.
# Each entry is a prefix matched against the argv tail after `iar`.
auto_confirm_commands = [
  "labels sync --dry-run",
  "run --dry-run",
  "review --dry-run",
  "ask --plan-only",
]
# Commands that prompt the user for confirmation before execution.
confirm_commands = [
  "run",
  "daemon",
  "review",
  "review-daemon",
  "issue create",
  "recover",
  "blocked-continue",
  "worktree create",
  "worktree remove",
]

[agent_runner.deliberation]
default_rounds = 2
default_synthesizer = "claude"
default_output_dir = "logs/agent-runner/deliberations"
continue_on_agent_error = true
agent_failure_timeout_seconds = 300
# After this many consecutive AI-asked rounds with no new user reply,
# append a soft hint to the question-list comment suggesting the operator
# swap `agent/deliberate` for `agent/rework-prd` to lock the scope in.
stale_rounds_before_hint = 3

[agent_runner.deliberation.profiles.architect]
agent = "claude"
role = "architect"
behavior_prompt = "You are an experienced software architect. Analyze the requirement from a system design perspective. Focus on modularity, scalability, and maintainability."

[agent_runner.deliberation.profiles.skeptic]
agent = "kimi"
role = "skeptic"
behavior_prompt = "You are a skeptical reviewer. Challenge assumptions, identify risks, and point out edge cases. Ask hard questions that others might miss."

[agent_runner.deliberation.profiles.implementer]
agent = "codex"
role = "implementer"
behavior_prompt = "You are a pragmatic implementer. Focus on feasibility, concrete steps, and implementation details. Highlight what can be built and what resources are needed."


# =============================================================================
# Agent Runner Console（统一管理终端）
# =============================================================================
# 管理终端的运行历史 / 审计落库与托管进程设置。

[agent_runner.repositories.keda-main]
path = "/Users/zata/code/keda"
enabled = true
display_name = "Keda Main"
[agent_runner.console]
# 运行历史与审计日志的 SQLite 文件路径（CLI 直跑与面板托管共用）。
history_db_path = "~/.iar/console.db"
# 面板托管 runner 进程的注册表（JSON pidfile，后端重启后据此复活探活）。
process_registry_path = "~/.iar/processes.json"
# 托管进程的 stdout/stderr 日志目录（相对 keda 项目根）。
process_log_dir = "logs/agent-runner/processes"
# 托管进程的启动命令前缀。默认走 `uv run iar` 并以 keda 项目根为 cwd，
# 因为全局安装的 iar 读不到项目本地 config.toml。
runner_command = ["uv", "run", "iar"]
# 停止进程时 SIGTERM 后等待多少秒升级为 SIGKILL。
stop_timeout_seconds = 30

# =============================================================================
# Agent Runner Daemon（常驻轮询）
# =============================================================================
# daemon / review-daemon 的默认轮询间隔（秒）。
# CLI 可通过 --interval 覆盖；环境变量 AGENT_RUNNER_REVIEW_INTERVAL_SECONDS
# 与 AGENT_RUNNER_RUN_INTERVAL_SECONDS 也可以覆盖。

[agent_runner.daemon]
review_interval_seconds = 120
run_interval_seconds = 120

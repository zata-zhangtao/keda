<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="iar pipeline: GitHub issue to pull request, with worktree isolation">
  <defs>
    <marker id="iarArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#475569"/>
    </marker>
    <filter id="iarShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="480" y="32" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" fill="#0f172a">iar · From GitHub Issue to Pull Request</text>
  <text x="480" y="52" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" fill="#64748b">本地常驻 daemon 轮询 ready issues · 每个任务独占一个 worktree</text>

  <!-- Stage 1: GitHub Issue -->
  <g filter="url(#iarShadow)">
    <rect x="30" y="90" width="150" height="110" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="105" y="118" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="700" fill="#7f1d1d">GitHub Issue</text>
  <text x="105" y="142" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#7f1d1d">label: agent/rework-prd</text>
  <text x="105" y="162" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#7f1d1d">或 label: agent/run</text>
  <text x="105" y="186" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#64748b">PRD 或 spec/bug 描述</text>

  <line x1="180" y1="145" x2="220" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#iarArrow)"/>
  <text x="200" y="138" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="10" fill="#64748b">fetch</text>

  <!-- Stage 2: iar daemon -->
  <g filter="url(#iarShadow)">
    <rect x="225" y="90" width="150" height="110" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="300" y="118" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="700" fill="#78350f">iar daemon</text>
  <text x="300" y="142" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#78350f">轮询间隔 600s</text>
  <text x="300" y="162" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#78350f">claim + 锁标签</text>
  <text x="300" y="186" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#64748b">.iar/registry 持久化</text>

  <line x1="375" y1="145" x2="415" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#iarArrow)"/>
  <text x="395" y="138" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="10" fill="#64748b">enqueue</text>

  <!-- Stage 3: Worktree -->
  <g filter="url(#iarShadow)">
    <rect x="420" y="90" width="160" height="110" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="500" y="118" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="700" fill="#1e3a8a">Worktree + Branch</text>
  <text x="500" y="142" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#1e3a8a">.iar-worktrees/issue-N</text>
  <text x="500" y="162" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#1e3a8a">branch: issue-N</text>
  <text x="500" y="186" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#64748b">隔离的 dev 环境</text>

  <line x1="580" y1="145" x2="620" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#iarArrow)"/>
  <text x="600" y="138" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="10" fill="#64748b">dispatch</text>

  <!-- Stage 4: AI Agent -->
  <g filter="url(#iarShadow)">
    <rect x="625" y="70" width="305" height="150" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="777" y="98" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="700" fill="#5b21b6">AI Agent (Claude / Codex)</text>
  <line x1="645" y1="108" x2="910" y2="108" stroke="#e9d5ff" stroke-width="1"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#5b21b6">
    <circle cx="650" cy="128" r="3" fill="#7c3aed"/>
    <text x="660" y="132">Plan · 阅读 PRD/代码,列出 acceptance</text>
    <circle cx="650" cy="148" r="3" fill="#7c3aed"/>
    <text x="660" y="152">Implement · 按 acceptance 改代码,运行 just test</text>
    <circle cx="650" cy="168" r="3" fill="#7c3aed"/>
    <text x="660" y="172">Review · 调用 code-reviewer skill 做自检</text>
    <circle cx="650" cy="188" r="3" fill="#7c3aed"/>
    <text x="660" y="192">Commit · 归档 PRD,签名 commit,推 worktree 分支</text>
  </g>

  <!-- Curved arrow back to PR -->
  <path d="M 777 225 Q 777 280 700 295 L 250 295 Q 175 295 175 250"
        fill="none" stroke="#475569" stroke-width="2" marker-end="url(#iarArrow)"/>
  <text x="475" y="288" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#64748b">push branch · gh pr create --draft</text>

  <!-- Stage 5: Pull Request -->
  <g filter="url(#iarShadow)">
    <rect x="30" y="320" width="150" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  </g>
  <text x="105" y="345" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="700" fill="#14532d">Pull Request</text>
  <text x="105" y="365" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#14532d">draft,等待人工 review</text>
  <text x="105" y="382" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#16a34a">✓ CI passed · ✓ just test</text>

  <!-- Side annotation: iar ask -->
  <g>
    <rect x="220" y="320" width="380" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
  </g>
  <text x="410" y="345" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="700" fill="#334155">iar ask · 自然语言决策入口</text>
  <text x="410" y="365" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#64748b">默认只生成 plan + 写审计,白名单动作才允许 --execute</text>
  <text x="410" y="382" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#64748b">禁止 git_push / git_merge / daemon / 任意 shell</text>
</svg>

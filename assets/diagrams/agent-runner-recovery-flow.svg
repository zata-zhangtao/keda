<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1250" width="900" height="1250">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-yes" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-no" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="1250" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#111827">Agent Runner Recovery Flow</text>
  <text x="450" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563">Fix Agent → Recovery Agent → WIP checkpoint</text>

  <g transform="translate(60, 95)">
    <rect width="18" height="18" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="28" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Runner action / decision</text>
    <rect x="170" width="18" height="18" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
    <text x="198" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Agent invocation</text>
    <rect x="310" width="18" height="18" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="338" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Success / commit path</text>
    <rect x="470" width="18" height="18" rx="4" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="498" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Failure / recovery path</text>
    <polygon points="650,9 668,0 686,9 668,18" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="696" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Decision</text>
  </g>

  <!-- Center main flow -->
  <ellipse cx="450" cy="155" rx="70" ry="25" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#0c4a6e">Agent finishes coding</text>

  <rect x="350" y="205" width="200" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">Stage all changes</text>
  <text x="450" y="241" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">git add -A</text>

  <rect x="350" y="270" width="200" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">Run verification</text>
  <text x="450" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">pre-commit / just test / etc.</text>

  <polygon points="450,355 520,390 450,425 380,390" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">Verification passed?</text>

  <!-- Right: success path -->
  <rect x="600" y="368" width="200" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="700" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#14532d">Commit via proxy</text>
  <text x="700" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">commit-request.json</text>

  <polygon points="700,455 770,490 700,525 630,490" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="700" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">WIP checkpoint?</text>

  <rect x="600" y="555" width="200" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="700" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">Squash WIP checkpoints</text>
  <text x="700" y="591" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">git reset --soft</text>

  <rect x="600" y="630" width="200" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="700" y="650" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#14532d">Push &amp; create PR</text>
  <text x="700" y="666" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">publish_changes</text>

  <ellipse cx="700" cy="720" rx="60" ry="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="700" y="725" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#14532d">Done</text>

  <!-- Left: failure path -->
  <rect x="100" y="368" width="200" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">Classify failure</text>
  <text x="200" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">FailureType</text>

  <polygon points="200,455 270,490 200,525 130,490" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="200" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">Simple local?</text>

  <rect x="100" y="555" width="200" height="44" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="200" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#581c87">Run Fix Agent</text>
  <text x="200" y="591" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">fix_timeout_seconds</text>

  <polygon points="200,642 270,677 200,712 130,677" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="200" y="675" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">Fix Agent worked?</text>

  <rect x="100" y="742" width="200" height="44" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="200" y="762" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#581c87">Run Recovery Agent</text>
  <text x="200" y="778" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">recovery_timeout_seconds</text>

  <polygon points="200,822 270,857 200,892 130,857" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="200" y="855" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">Recovery worked?</text>

  <rect x="100" y="922" width="200" height="44" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="200" y="942" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#7c2d12">Checkpoint WIP commit</text>
  <text x="200" y="958" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">[Agent][WIP] Issue #N</text>

  <polygon points="380,922 450,957 380,992 310,957" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
  <text x="380" y="955" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#713f12">Max attempts?</text>

  <rect x="540" y="935" width="160" height="44" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="620" y="955" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Mark agent/failed</text>
  <text x="620" y="971" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">stop recovery</text>

  <ellipse cx="620" cy="1030" rx="60" ry="22" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="620" y="1035" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Failed</text>

  <!-- Arrows -->
  <!-- Main flow -->
  <line x1="450" y1="180" x2="450" y2="205" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="450" y1="249" x2="450" y2="270" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="450" y1="314" x2="450" y2="355" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Verification Yes -> Commit -->
  <path d="M520,390 L600,390" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-yes)" fill="none"/>
  <text x="560" y="382" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a">Yes</text>

  <!-- Verification No -> Classify failure (route around bottom) -->
  <path d="M380,390 L330,390 L330,445 L300,445 L300,412" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-no)" fill="none"/>
  <text x="335" y="382" font-family="system-ui, sans-serif" font-size="11" fill="#dc2626">No</text>

  <!-- Commit -> WIP check -->
  <line x1="700" y1="412" x2="700" y2="455" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- WIP Yes -> Squash -->
  <path d="M700,525 L700,555" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text x="710" y="545" font-family="system-ui, sans-serif" font-size="11" fill="#2563eb">Yes</text>

  <!-- WIP No -> Push (go around left) -->
  <path d="M630,490 L580,490 L580,652 L600,652" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-yes)" fill="none"/>
  <text x="635" y="482" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a">No</text>

  <!-- Squash -> Push -->
  <line x1="700" y1="599" x2="700" y2="630" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <!-- Push -> Done -->
  <line x1="700" y1="674" x2="700" y2="698" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Classify -> Simple local? -->
  <line x1="200" y1="412" x2="200" y2="455" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <!-- Simple local Yes -> Fix Agent -->
  <line x1="200" y1="525" x2="200" y2="555" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text x="210" y="545" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Yes</text>
  <!-- Simple local No -> Recovery Agent (go around right) -->
  <path d="M270,677 L320,677 L320,764 L300,764" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text x="285" y="670" font-family="system-ui, sans-serif" font-size="11" fill="#9333ea">No</text>

  <!-- Fix Agent -> Fix worked? -->
  <line x1="200" y1="599" x2="200" y2="642" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <!-- Fix worked Yes -> loop back to verification (wide left arc) -->
  <path d="M130,677 L80,677 L80,294 L350,294" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-yes)" fill="none"/>
  <text x="90" y="670" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a">Yes</text>
  <!-- Fix worked No -> Recovery Agent -->
  <path d="M200,712 L200,742" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-no)" fill="none"/>
  <text x="210" y="732" font-family="system-ui, sans-serif" font-size="11" fill="#dc2626">No</text>

  <!-- Recovery Agent -> Recovery worked? -->
  <line x1="200" y1="786" x2="200" y2="822" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <!-- Recovery worked Yes -> loop back to verification (left arc, lower than Fix Agent loop) -->
  <path d="M130,857 L60,857 L60,270 L350,270" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-yes)" fill="none"/>
  <text x="70" y="850" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a">Yes</text>
  <!-- Recovery worked No -> Checkpoint WIP -->
  <path d="M200,892 L200,922" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-no)" fill="none"/>
  <text x="210" y="912" font-family="system-ui, sans-serif" font-size="11" fill="#dc2626">No</text>

  <!-- Checkpoint WIP -> Max attempts? -->
  <path d="M300,944 L310,957" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <!-- Max attempts Yes -> Mark failed -->
  <path d="M450,957 L540,957" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-no)" fill="none"/>
  <text x="485" y="949" font-family="system-ui, sans-serif" font-size="11" fill="#dc2626">Yes</text>
  <!-- Max attempts No -> loop back to Recovery Agent (right arc) -->
  <path d="M380,957 L350,957 L350,786 L300,786" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <text x="360" y="949" font-family="system-ui, sans-serif" font-size="11" fill="#9333ea">No</text>

  <!-- Mark failed -> Failed -->
  <line x1="620" y1="979" x2="620" y2="1008" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
</svg>

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  frontend-build:
    name: Frontend Build (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - frontend-admin
          - frontend-public
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        # frontend-admin 的 `build` 已自带 `tsc -b`；frontend-public 有独立
        # `typecheck` 脚本。用 --if-present 让缺失脚本时无声跳过，且不破坏
        # 矩阵中已有 typecheck 的项目。
        run: pnpm run --if-present typecheck

      - name: Build
        run: pnpm run build

  validate-template:
    name: Validate Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies from lock file
        run: uv sync --all-extras --all-groups --frozen

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Check max file lines (hard limit)
        # 模板硬门禁:新文件 / 修改文件非空行 ≤ 1000。存量超额文件落在
        # hooks/shared/max_file_lines.allowlist.txt 中,只产生 WARNING。
        # 清零进度由拆分 PRD 推动,见 tasks/pending/ 下对应的 P0-DEBT PRD。
        run: >-
          uv run python hooks/shared/check_max_file_lines.py
          --max-lines 1000
          --glob '*.py'
          src/backend
          --allow-list-file hooks/shared/max_file_lines.allowlist.txt

      - name: Run local test suite
        run: uv run pytest tests/ -v -m "not expensive"

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Build template release archive
        run: uv run python scripts/shared/release.py

      - name: Locate release archive
        id: release_archive
        run: |
          shopt -s nullglob
          release_archives=(dist/*.zip)
          if [ "${#release_archives[@]}" -ne 1 ]; then
            echo "Expected exactly one release archive, found ${#release_archives[@]}."
            exit 1
          fi
          echo "release_archive_path=${release_archives[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload release smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: template-release-${{ github.sha }}
          path: ${{ steps.release_archive.outputs.release_archive_path }}
          if-no-files-found: error
